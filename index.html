<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5测试页面</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-register {
            background-color: #4CAF50;
        }
        .btn-register:hover {
            background-color: #45a049;
        }
        .btn-login {
            background-color: #2196F3;
        }
        .btn-login:hover {
            background-color: #1976D2;
        }
        .btn-recharge {
            background-color: #FF9800;
        }
        .btn-recharge:hover {
            background-color: #F57C00;
        }
        .btn-package {
            background-color: #9C27B0;
        }
        .btn-package:hover {
            background-color: #7B1FA2;
        }
        .btn-appsflyer {
            background-color: #00BCD4;
        }
        .btn-appsflyer:hover {
            background-color: #0097A7;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            min-height: 50px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
        .title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1 class="title">H5功能测试</h1>
    <div class="button-container">
        <button class="btn-register" onclick="handleRegister()">注册</button>
        <button class="btn-login" onclick="handleLogin()">登陆</button>
        <button class="btn-recharge" onclick="handleRecharge()">充值</button>
        <button class="btn-package" onclick="handleGetPackageName()">获取包名</button>
        <button class="btn-appsflyer" onclick="handleGetAppsFlyerId()">获取AppsFlyerId</button>
    </div>
    <div class="result" id="result">点击按钮查看结果...</div>

    <script>
        // DeviceInfo配置
        window.DeviceInfo = {
            getPackageName: () => {
                return 'com.mnpqrs.abcdexyz';
            },
            getVersionCode: () => {
                return 1;
            }
        };

        // Appsflyer配置
        window.Appsflyer = {
            logEventByApp: (eventName, eventParams) => {
                console.log(eventName, eventParams);
                var p = JSON.parse(eventParams);
                var data = JSON.stringify({
                    'event': eventName,
                    params: p
                });
                if (window.ReactNativeWebView) {
                    window.ReactNativeWebView.postMessage(data);
                } else {
                    console.log('ReactNativeWebView not available, would post:', data);
                }
            },
            getAppsFlyerId: () => {
                if (window.xxappUID) {
                    alert(window.xxappUID);
                    return window.xxappUID;
                } else {
                    var mockId = 'mock-appsflyer-id-12345';
                    window.xxappUID = mockId;
                    alert(mockId);
                    return mockId;
                }
            }
        };

        // 模拟xxappUID（在实际环境中由RN注入）
        if (!window.xxappUID) {
            window.xxappUID = 'mock-appsflyer-id-12345';
        }

        // 按钮事件处理函数
        function handleRegister() {
            var params = JSON.stringify({
                action: 'register',
                timestamp: Date.now()
            });
            window.Appsflyer.logEventByApp('register', params);
            document.getElementById('result').textContent = '注册事件已触发\nEvent: register\nParams: ' + params;
        }

        function handleLogin() {
            var params = JSON.stringify({
                action: 'login',
                timestamp: Date.now()
            });
            window.Appsflyer.logEventByApp('login', params);
            document.getElementById('result').textContent = '登陆事件已触发\nEvent: login\nParams: ' + params;
        }

        function handleRecharge() {
            var params = JSON.stringify({
                action: 'recharge',
                amount: 100,
                timestamp: Date.now()
            });
            window.Appsflyer.logEventByApp('recharge', params);
            document.getElementById('result').textContent = '充值事件已触发\nEvent: recharge\nParams: ' + params;
        }

        function handleGetPackageName() {
            var packageName = window.DeviceInfo.getPackageName();
            document.getElementById('result').textContent = '包名: ' + packageName;
        }

        function handleGetAppsFlyerId() {
            var appsFlyerId = window.Appsflyer.getAppsFlyerId();
            document.getElementById('result').textContent = 'AppsFlyerId: ' + appsFlyerId;
        }
    </script>
</body>
</html>
